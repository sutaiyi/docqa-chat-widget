<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<title>AI Support</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html,
			body {
				width: 100%;
				height: 100%;
				overflow: hidden;
				padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
			}
		</style>
	</head>
	<body>
		<script>
		(function(){
			var s = document.createElement('script');
			var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
			var server = isLocal ? location.origin : 'https://widget.docqa.xyz';
			s.src = server + '/widget/chat-widget.js';
			s.setAttribute('data-server', server);
			s.setAttribute('data-base-url', isLocal ? server : 'https://widget.docqa.xyz');
			s.setAttribute('data-mode', 'fullscreen');
			s.setAttribute('data-theme', 'dark');
			document.body.appendChild(s);
		})();
		</script>
	</body>
</html>
